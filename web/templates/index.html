<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体库 - 卡片展示</title>
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="fixed-header">
        <div class="header-inner">
            <h1>📚 字体库</h1>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="搜索字体名称...">
                <i class="fas fa-search" id="searchIcon"></i>
            </div>
            <div class="header-actions">
                <button id="uploadBtn" class="upload-btn">📤 上传字体</button>
                <button id="wordcloudBtn" class="upload-btn" style="background: #805ad5;">✨ 词云生成器</button>
                <button id="fontPreviewBtn" class="upload-btn" style="background: #3b82f6;">🔍 字体预览器</button>
            </div>
            <!-- 字体预览器模态框 -->
            <div id="fontPreviewModal" class="modal">
                <div class="modal-content" style="width: 600px;">
                    <div class="modal-header">
                        <h2>字体预览器</h2>
                        <span class="close-preview">&times;</span>
                    </div>
                    <!-- 上传字体 -->
                    <div class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">📁 上传字体文件</div>
                            <input type="file" id="previewFontFile" accept=".ttf,.otf,.woff2" style="border: none; background: transparent; width: 100%;">
                        </div>
                    </div>
                    <!-- 预览文本 -->
                    <div class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">✍️ 预览文本</div>
                            <input type="text" id="previewText" value="字体预览器 0123 abc" style="border: none; background: transparent; width: 100%;">
                        </div>
                    </div>
                    <!-- 字体大小 -->
                    <div class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">🔠 字体大小 (<span id="fontSizeValue">32</span>px)</div>
                            <input type="range" id="fontSizeSlider" min="12" max="72" value="32" step="1" style="width: 100%; margin-top: 0.5rem;">
                        </div>
                    </div>
                    <!-- 预览区域 -->
                    <div class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">🔍 预览效果</div>
                            <div id="previewTextElement" style="min-height: 80px; padding: 0.5rem; background: #f9fafb; border-radius: 6px;">字体预览器 0123 abc</div>
                        </div>
                    </div>
                    <div class="form-actions" style="margin-top: 1rem;">
                        <button class="cancel-btn" id="closePreviewModalBtn">关闭</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <!-- 模态框 -->
        <div id="uploadModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>上传字体</h2>
                    <span class="close">&times;</span>
                </div>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">📤 上传方式</div>
                            <select id="uploadType" class="upload-select">
                                <option value="single">单个字体</option>
                                <option value="batch">批量上传</option>
                            </select>
                        </div>
                    </div>
                    <div id="singleUploadArea" class="form-block">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">📄 选择字体文件</div>
                            <input type="file" id="singleFile" accept=".ttf,.otf,.ttc,.otc" class="file-input">
                        </div>
                    </div>
                    <div id="batchUploadArea" class="form-block" style="display: none;">
                        <div class="fieldset-wrapper">
                            <div class="fieldset-label">📁 选择多个字体文件</div>
                            <input type="file" id="batchFiles" multiple accept=".ttf,.otf,.ttc,.otc" class="file-input">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="submit-btn">开始上传</button>
                        <button type="button" class="cancel-btn" id="cancelUploadBtn">取消</button>
                    </div>
                    <div id="uploadResult" style="margin-top: 1rem; text-align: center;"></div>
                </form>
            </div>
        </div>

        <div class="card-grid" id="cardGrid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 编辑字体模态框 -->
    <div id="editFontModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑字体信息</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="editFontForm">
                <input type="hidden" id="editFontName">
                <!-- 自定义字体名 -->
                <div class="form-block">
                    <div class="fieldset-wrapper">
                        <div class="fieldset-label">✏️ 自定义字体名</div>
                        <input type="text" id="customFontName" placeholder="例如：思源黑体修改版">
                    </div>
                </div>
                <!-- 下载链接 -->
                <div class="form-block">
                    <div class="fieldset-wrapper">
                        <div class="fieldset-label">🔗 下载链接</div>
                        <input type="url" id="customDownloadLink" placeholder="https://example.com/font.zip">
                    </div>
                </div>
                <div class="form-block">
                    <div class="fieldset-wrapper">
                        <div class="fieldset-label">🔗 官方链接</div>
                        <input type="url" id="customOfficialLink" placeholder="https://example.com/font">
                    </div>
                </div>
                <!-- 字重 -->
                <div class="form-block">
                    <div class="fieldset-wrapper">
                        <div class="fieldset-label">⚖️ 字重</div>
                        <input type="text" id="customFontWeight" placeholder="例如：Bold, Regular, Light">
                    </div>
                </div>
                <!-- 许可证选择（新增） -->
                <div class="form-block">
                    <div class="fieldset-wrapper">
                        <div class="fieldset-label">📜 许可证</div>
                        <select id="customLicenseSelect" class="license-select">
                            <option value="">-- 自动检测 --</option>
                            <option value="OFL">OFL</option>
                            <option value="GPL">GPL</option>
                            <option value="MIT">MIT</option>
                            <option value="Apache">Apache</option>
                            <option value="BSD">BSD</option>
                            <option value="Free">其他开源免费声明</option>
                            <option value="unknown">商用需授权</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="submit-btn">保存</button>
                    <button type="button" class="cancel-btn" id="resetEditBtn">重置</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content" style="width: 350px;">
            <div class="modal-header">
                <h2>登录</h2>
                <span class="close-login">&times;</span>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="submit-btn">登录</button>
                <div id="loginError" style="color:red; margin-top:10px;"></div>
            </form>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
